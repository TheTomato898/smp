<!DOCTYPE html>
<html lang="de">
  <head>
    
    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    
    <!-- Config -->
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.webp">
    <title>NoahSMP</title>
    
  </head>
  <body>
    <div class='hero'>
      
      <h1>NoahSMP</h1>
      
      <div class='description'>
        <p>Tauche ein in eine einzigartige Survival-Welt mit einer aktiven Community, spannenden Projekten und unbegrenzten Möglichkeiten.</p>
        <p>Baue, entdecke und erschaffe deine eigene Geschichte auf dem NoahSMP.</p>
      </div>
      
      <div class='buttons'>
        <a class='button' href="https://dsc.gg/noahsmp" target='_blank'>Trete dem Discord bei <i data-lucide="external-link"></i></a>
        <h3 class='button' id='copy-button'>
          <span id='copy-text'>Copy Server IP </span>
          <span id='copy-icon'>
            <i data-lucide="copy"></i>
          </span>
        </h3>
      </div>
    </div>

    <!--
    <div class="status-box">
        <p>Status: <span id="server-status">Lädt...</span></p>
        <p>Spieler: <span id="player-count">-</span></p>
    </div>
    -->
    
    <!-- Config -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="./script.js"></script>
  </body>
</html>
